---
# SPDX-License-Identifier: Apache-2.0
# SPDX-FileCopyrightText: 2025 The Linux Foundation

# Metadata for a shared agent. Copy this folder into
# contributors/<your-handle>/agents/<agent-name>/ and fill in the fields.

# Human-readable name of the agent.
name: my-agent

# One- or two-sentence summary of what the agent does and when to use it.
description: >-
  Short description of the agent's purpose, the problem it solves, and the
  context in which it should be used.

# GitHub handle (or team name) of the contributor who owns this entry.
author: your-handle

# Target tool / runtime this agent is built for.
# Examples: copilot, claude, cursor, generic, mcp
tool: generic

# Kind of entry. For this folder it is always "agent".
kind: agent

# Free-form tags used for discovery and the generated index.
tags:
  - example
  - getting-started

# Semantic version of this agent definition.
version: 0.1.0

# SPDX license identifier for this entry. Defaults to the repo license.
license: Apache-2.0
