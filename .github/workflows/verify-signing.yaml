name: Verify commit signing

on:  # yamllint disable-line rule:truthy
  pull_request:
    branches:
      - "**"

permissions:
  contents: read
  pull-requests: read

jobs:
  verify-signing:
    name: GPG signatures, authorship, and DCO
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        # Check out the base branch so the verification script cannot be
        # altered by the pull request it is validating.
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          ref: ${{ github.event.pull_request.base.sha }}

      - name: Verify commits are signed, authored by the PR opener, and DCO-signed
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: ./scripts/verify-pr-signing.sh
